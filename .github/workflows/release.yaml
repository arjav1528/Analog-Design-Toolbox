name: Release Desktop Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      version_with_build: ${{ steps.meta.outputs.version_with_build }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          VERSION="$(awk '/^version:/{split($2,a,"+"); print a[1]}' pubspec.yaml)"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          VERSION_WITH_BUILD="${VERSION}+${BUILD_NUMBER}"
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="v${VERSION_WITH_BUILD}"
          fi

          RELEASE_NAME="ADT ${VERSION_WITH_BUILD}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version_with_build=${VERSION_WITH_BUILD}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
      - run: |
          flutter channel main
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev
          dart pub global activate flutter_distributor
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          bash scripts/build_release_linux.sh "${{ needs.prepare.outputs.version_with_build }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/**/*.deb
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
      - run: flutter channel main
      - run: |
          dart pub global activate flutter_distributor
          $env:Path += ";$HOME\.pub-cache\bin"
          powershell -ExecutionPolicy Bypass -File scripts/build_release_windows.ps1 "${{ needs.prepare.outputs.version_with_build }}"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/**/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
      - run: |
          flutter channel main
          npm install -g appdmg
          dart pub global activate flutter_distributor
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          bash scripts/build_release_macos.sh "${{ needs.prepare.outputs.version_with_build }}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/**/*.dmg
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-windows, build-macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
